# alembic.ini — Alembic configuration for PetVerse
#
# The DATABASE_URL is read from the .env file at runtime via env.py.
# Do NOT hardcode credentials here.

[alembic]
# Migrations directory
script_location = alembic

# Template used to generate migration file names
# Format: YYYY-MM-DD_HHMM_<revision>_<slug>
file_template = %%(year)d-%%(month).2d-%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Do not include revision in path (revisions are in the file name)
prepend_sys_path = .

# Migration file encoding
output_encoding = utf-8

# sqlalchemy.url is set dynamically in env.py from DATABASE_URL env var.
# The value below is a fallback placeholder only — never used in practice.
sqlalchemy.url = mysql+aiomysql://root:password@localhost:3306/petverse


[post_write_hooks]
# Hooks to run after generating a new migration file.
# Uncomment if you want auto-formatting:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88 REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
